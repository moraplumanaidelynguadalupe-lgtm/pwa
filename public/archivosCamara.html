 <!DOCTYPE html>
<html lang="es">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width">
 <meta name="theme-color" content="#633BBC">

 <title>Archivos y Cámara</title>

 <link rel="stylesheet" href="css/material-symbols-outlined.css">
 <link rel="stylesheet" href="libmde/md-filled-button.css">
 <link rel="stylesheet" href="libmde/md-filled-text-field.css">

 
</head>

<body>

 <h1> Archivos y Cámara</h1>

 <!-- FOTO -->
 <div class="card">
  <label>
   <span class="material-symbols-outlined icon">photo_camera</span>
   Foto desde cámara
   <input type="file" accept="image/*" capture="environment">
  </label>
 </div>

 <!-- VIDEO -->
 <div class="card">
  <label>
   <span class="material-symbols-outlined icon">videocam</span>
   Video desde móvil
   <input type="file" accept="video/*" capture="environment">
  </label>
 </div>

 <!-- ARCHIVO -->
 <div class="card">
  <label>
   <span class="material-symbols-outlined icon">folder</span>
   Seleccionar archivo
   <input type="file">
  </label>
 </div>

</body>

</html>
 
</body>
</html>
